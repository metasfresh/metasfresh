          command: docker push --quiet metasfresh/metas-externalsystems:${{ needs.init.outputs.tag-fixed }}
      - name: push-image metasfresh/metas-externalsystems:${{ needs.init.outputs.tag-floating }}
        if: env.ACT != 'true'
