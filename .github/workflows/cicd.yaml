          command: docker push --quiet metasfresh/metasfresh-externalsystems:${{ needs.init.outputs.tag-fixed }}-compat

      - name: produce-summary
        run: |
          echo 'compatibility images are available under the following tag: `${{ needs.init.outputs.tag-fixed }}-compat`' >> $GITHUB_STEP_SUMMARY
          echo 'and can be deployed on any regular system via metasfresh instances rollout using the above tag as *Baseversion*.' >> $GITHUB_STEP_SUMMARY
          echo '#### images' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-webapi:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-app:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-webui:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-db:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-db-migration-tool:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-edi:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metasfresh-externalsystems:${{ needs.init.outputs.tag-fixed }}-compat' >> $GITHUB_STEP_SUMMARY

  junit:
    name: test (java)
    runs-on: ubuntu-latest
    needs: [ init, java ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - uses: testspace-com/setup-testspace@v1
        with:
          domain: metasfresh
          token: ${{ secrets.TESTSPACE_TOKEN }}
      - name: prepare-settings
        env:
          METASFRESH_PACKAGES_READ_TOKEN: ${{ secrets.METASFRESH_PACKAGES_READ_TOKEN }}
        run: |
          envsubst < docker-builds/mvn/settings.xml > docker-builds/mvn/local-settings.xml
      - name: run-junit-tests-j8
        run: |
          docker buildx build \
          --progress=plain \
          --file docker-builds/Dockerfile.junit \
          --cache-to type=inline \
          --cache-from metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }} \
          --secret id=mvn-settings,src=docker-builds/mvn/local-settings.xml \
          --build-arg REFNAME=${{ needs.init.outputs.tag-fixed }} \
          --build-arg SKIP_MIGRATION_SCRIPTS_TEST=true \
          --tag metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }} \
          --tag metasfresh/metas-junit:${{ needs.init.outputs.tag-fixed }} \
          .
      - name: run-junit-tests-j14
        run: |
          docker buildx build \
          --progress=plain \
          --file docker-builds/Dockerfile.camel.junit \
          --cache-to type=inline \
          --cache-from metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }}-j14 \
          --secret id=mvn-settings,src=docker-builds/mvn/local-settings.xml \
          --build-arg REFNAME=${{ needs.init.outputs.tag-fixed }} \
          --tag metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }}-j14 \
          --tag metasfresh/metas-junit:${{ needs.init.outputs.tag-fixed }}-j14 \
          .
      - name: push-result-image
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: |
            docker push --quiet metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }}
            docker push --quiet metasfresh/metas-junit:${{ needs.init.outputs.tag-floating }}-j14
      - name: push-results
        run: |
          docker run --rm --volume "$(pwd)/junit:/reports" metasfresh/metas-junit:${{ needs.init.outputs.tag-fixed }}           # extracting java8 test results from docker image
          docker run --rm --volume "$(pwd)/junit:/reports" metasfresh/metas-junit:${{ needs.init.outputs.tag-fixed }}-j14       # extracting java14 test results from docker image
          find junit -type d -links 2 -exec testspace [{}]{}/*.xml \;                                                           # upload all junit xml's to testspace 
          testspace "[junit/commons]junit/commons/junit.log{$(awk '{ sum += $1 } END { print sum }' junit/commons/junit.exit-code junit/commons/junit.mvn.exit-code):java 8 commons junit tests}"     # upload commons log with combined exit code  
          testspace "[junit/backend]junit/backend/junit.log{$(awk '{ sum += $1 } END { print sum }' junit/backend/junit.exit-code junit/backend/junit.mvn.exit-code):java 8 backend junit tests}"     # upload backend log with combined exit code 
          testspace "[junit/camel]junit/camel/junit.log{$(awk '{ sum += $1 } END { print sum }' junit/camel/junit.exit-code junit/camel/junit.mvn.exit-code):java 14 camel junit tests}"              # upload camel log with combined exit code       
      - name: assert success
        run: |
          if [ $(cat junit/commons/junit.exit-code) != 0 ] || [ $(cat junit/commons/junit.mvn.exit-code) != 0 ]; then tail -1000 junit/commons/junit.log && exit 1; fi      # print commons log and exit if commons failed
          if [ $(cat junit/backend/junit.exit-code) != 0 ] || [ $(cat junit/backend/junit.mvn.exit-code) != 0 ]; then tail -1000 junit/backend/junit.log && exit 1; fi      # print backend log and exit if backend failed
          if [ $(cat junit/camel/junit.exit-code) != 0 ] || [ $(cat junit/camel/junit.mvn.exit-code) != 0 ]; then tail -1000 junit/camel/junit.log && exit 1; fi            # print camel log and exit if camel failed
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: junit-logs
          path: junit/**/junit.log

  cucumber-build:
    name: build (cucumber)
    runs-on: ubuntu-latest
    needs: [ init, java ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - name: prepare-settings
        env:
          METASFRESH_PACKAGES_READ_TOKEN: ${{ secrets.METASFRESH_PACKAGES_READ_TOKEN }}
        run: |
          envsubst < docker-builds/mvn/settings.xml > docker-builds/mvn/local-settings.xml
      - name: build-cucumber
        run: |
          docker buildx build \
          --progress=plain \
          --file docker-builds/Dockerfile.cucumber \
          --secret id=mvn-settings,src=docker-builds/mvn/local-settings.xml \
          --build-arg REFNAME=${{ needs.init.outputs.tag-fixed }} \
          --tag metasfresh/metas-cucumber:${{ needs.init.outputs.tag-floating }} \
          --tag metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }} \
          .
      - name: push-image metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }}
      - name: push-image metasfresh/metas-cucumber:${{ needs.init.outputs.tag-floating }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-cucumber:${{ needs.init.outputs.tag-floating }}
      - name: produce-summary
        run: |
          echo '#### images' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }}' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metas-cucumber:${{ needs.init.outputs.tag-floating }}' >> $GITHUB_STEP_SUMMARY   

  cucumber-run:
    name: test (cucumber)
    runs-on: ubuntu-latest
    needs: [ init, backend, frontend, cucumber-build, preloaded-db ]
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        profile: [ profile1, profile2, profile3, profile4, profile5, profile6, profile7, report, flaky, catchall ]
        include:
          - profile: profile1
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor1"
          - profile: profile2
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor2"
          - profile: profile3
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor3"
          - profile: profile4
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor4"
          - profile: profile5
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor5"
          - profile: profile6
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor6"
          - profile: profile7
            params: -DexcludedGroups="ignore,flaky" -Dgroups="ghActions:run_on_executor7"
          - profile: report
            params: -DexcludedGroups="ignore,flaky" -Dgroups="report"
          - profile: flaky
            params: -DexcludedGroups="ignore" -Dgroups="flaky"
          - profile: catchall
            params: -DexcludedGroups="ignore,ghActions:run_on_executor1,ghActions:run_on_executor2,ghActions:run_on_executor3,ghActions:run_on_executor4,ghActions:run_on_executor5,ghActions:run_on_executor6,ghActions:run_on_executor7,report,flaky"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - uses: testspace-com/setup-testspace@v1
        with:
          domain: metasfresh
          token: ${{ secrets.TESTSPACE_TOKEN }}
      - name: run-tests
        env:
          mfversion: ${{ needs.init.outputs.tag-fixed }}
          cucumberparams: ${{ matrix.params }}
          TEST_SMTP_HOST: ${{ secrets.TEST_SMTP_HOST }}
          TEST_SMTP_FROM: ${{ secrets.TEST_SMTP_FROM }}
          TEST_SMTP_USER: ${{ secrets.TEST_SMTP_USER }}
          TEST_SMTP_PASSWORD: ${{ secrets.TEST_SMTP_PASSWORD }}
        timeout-minutes: 120
        run: |
          mkdir -p cucumber
          docker pull metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }} --quiet
          docker cp "$(docker create --name tempcopytainer metasfresh/metas-cucumber:${{ needs.init.outputs.tag-fixed }}):/compose.yml" . && docker rm tempcopytainer
          docker compose up --abort-on-container-exit --exit-code-from cucumber 2>&1 | tee cucumber.log && echo "${PIPESTATUS[0]}" > cucumber.exit-code
          docker commit metasfresh-db-1 metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postcucumber-${{ matrix.profile }}
          docker compose down
          cat cucumber.log | grep -q "BUILD SUCCESS" && echo "$?" > cucumber.mvn.exit-code || echo "$?" > cucumber.mvn.exit-code
      - name: push-results
        run: |
          testspace "[cucumber/${{ matrix.profile }}]cucumber/**/*.xml"
          testspace "[cucumber/${{ matrix.profile }}]cucumber/*.html"
          testspace "[cucumber/${{ matrix.profile }}]cucumber.log{$(awk '{ sum += $1 } END { print sum }' cucumber.exit-code cucumber.mvn.exit-code):cucumber tests}"
      - name: Extract Cucumber Allure results
        if: always()
        run: |
          # Allure results are generated in target/allure-results inside the cucumber container
          # The compose.yml mounts ./cucumber:/opt/metasfresh/target, so results should be in ./cucumber/allure-results
          mkdir -p cucumber-allure-results
          if [ -d "cucumber/allure-results" ]; then
            cp -r cucumber/allure-results/. cucumber-allure-results/
            # Create environment.properties to tag this profile
            echo "executor.profile=${{ matrix.profile }}" >> cucumber-allure-results/environment.properties
            echo "branch=${{ github.ref_name }}" >> cucumber-allure-results/environment.properties
            echo "build=${{ needs.init.outputs.tag-fixed }}" >> cucumber-allure-results/environment.properties
            echo "Allure results extracted from cucumber/allure-results ($(ls cucumber-allure-results | wc -l) files)"
          else
            echo "No Allure results found in cucumber/allure-results - this is expected for first run without Allure plugin"
          fi
      - name: Upload Cucumber Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-allure-results-${{ matrix.profile }}
          path: cucumber-allure-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: push-database-image metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postcucumber-${{ matrix.profile }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postcucumber-${{ matrix.profile }}                                                          # upload database image containing post cucumber test state
      - name: produce-summary
        run: |
          echo '#### images' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postcucumber-${{ matrix.profile }}' >> $GITHUB_STEP_SUMMARY
      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
      - name: assert success
        run: |
          junit_xml_path="cucumber/cucumber-junit.xml"

          if [ -f "$junit_xml_path" ]; then
            echo "Parsing JUnit XML report at: $junit_xml_path"

            # Extract failures and errors from the XML using xmllint.
            # We explicitly check for 'testsuite' as the root element that holds 'failures' and 'errors'.
            failures=$(xmllint --xpath 'string(//testsuite/@failures)' "$junit_xml_path" 2>/dev/null)
            errors=$(xmllint --xpath 'string(//testsuite/@errors)' "$junit_xml_path" 2>/dev/null)

            # Default to 0 if the attributes are not found or xmllint returns nothing.
            failures=${failures:-0}
            errors=${errors:-0}

            echo "Found $failures failures and $errors errors in $junit_xml_path"

            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
              tail -n 1000 cucumber.log || true # Print last 1000 lines of log (if available).
              echo "--- Cucumber tests FAILED! ---"
              echo "Failures: $failures, Errors: $errors"
              exit 1 # Exit with a non-zero code to indicate failure
            else
              echo "--- All Cucumber tests PASSED successfully! ---"
            fi
          else
            echo "ERROR: JUnit XML report not found at $junit_xml_path."
            echo "This is unexpected, as entrypoint.sh should copy it. Check container logs and paths."
            tail -n 1000 cucumber.log || true # Print last 1000 lines of log.
            exit 1 # Fail the CI/CD step if the report is missing.
          fi
      - name: Check if 'metasfreshArchives' directory exists
        id: check_metasfreshArchives_dir
        run: |
          if [ -d "cucumber/metasfreshArchives/" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/upload-artifact@v4
        if: steps.check_metasfreshArchives_dir.outputs.exists == 'true'
        with:
          name: metasfreshArchives-${{ matrix.profile }}
          path: cucumber/metasfreshArchives/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cucumber-logs-${{ matrix.profile }}
          path: cucumber.log
          retention-days: 30

  cucumber-allure-report:
    name: Generate Cucumber Allure Report
    runs-on: ubuntu-latest
    needs: [ init, cucumber-run ]
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all Cucumber Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: cucumber-allure-results-*
          path: all-cucumber-results/
          merge-multiple: true

      - name: Check if results exist
        id: check_results
        run: |
          if [ -d "all-cucumber-results" ] && [ "$(ls -A all-cucumber-results 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
            echo "Found Allure results:"
            ls -la all-cucumber-results/
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
            echo "No Allure results found - skipping report generation"
          fi

      - name: Setup Allure
        if: steps.check_results.outputs.has_results == 'true'
        uses: ./.github/actions/setup-allure

      - name: Generate combined Allure report
        if: steps.check_results.outputs.has_results == 'true'
        uses: ./.github/actions/generate-allure-report
        with:
          results-dir: all-cucumber-results
          output-dir: cucumber-allure-report
          artifact-name: allure-report-cucumber
          retention-days: 30

  health_check:
    name: health check
    runs-on: ubuntu-latest
    needs: [ init, backend, frontend, preloaded-db ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - name: start docker compose
        working-directory: docker-builds/compose/
        env:
          mfversion: ${{ needs.init.outputs.tag-fixed }}
        run: |
          docker compose up -d
      - name: Make the script files executable
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          chmod +x apiHealthChecks.sh containerHealthCheck.sh
      - name: db health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh db
      - name: webapi health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh webapi
      - name: app health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh app
      - name: rabbitmq health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh rabbitmq
      - name: search health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh search
      - name: external health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh external
      - name: webui health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh webui
      - name: mobile health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh mobile
      - name: edi health check
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./containerHealthCheck.sh edi
      - name: run api health checks
        working-directory: docker-builds/health/
        if: success() || failure()
        run: |
          ./apiHealthChecks.sh
      - name: create docker compose summary
        working-directory: docker-builds/compose/
        if: success() || failure()
        run: |
          docker compose ps -a
          docker inspect --format "{{json .State.Health }}" compose-db-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-webapi-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-app-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-rabbitmq-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-search-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-webui-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-external-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-mobile-1 | jq
          docker inspect --format "{{json .State.Health }}" compose-edi-1 | jq
      - name: stop docker compose
        working-directory: docker-builds/compose/
        env:
          mfversion: ${{ needs.init.outputs.tag-fixed }}
        if: success() || failure()
        run: |
          docker compose down

  mobile_test:
    name: mobile test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [ init, backend, frontend, preloaded-db ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - uses: testspace-com/setup-testspace@v1
        with:
          domain: metasfresh
          token: ${{ secrets.TESTSPACE_TOKEN }}
      - name: run test
        working-directory: docker-builds/e2e-tests/
        env:
          mfversion: ${{ needs.init.outputs.tag-fixed }}
          mfregistry: metasfresh
          dbqualifier: preloaded
        run: |
          docker compose --profile mobile up --abort-on-container-exit --exit-code-from playwright-mobile 2>&1 | tee playwright.log && echo "${PIPESTATUS[0]}" > playwright.exit-code
          docker commit e2e-tests-db-1 metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postmobiletest
          docker compose --profile mobile down
      - name: push-results
        working-directory: docker-builds/e2e-tests/
        run: |
          # Move test-results temporarily to avoid Testspace uploading large attachment files
          mv test-results-mobile test-results-temp || true
          testspace "[mobile/playwright]playwright-report-mobile/junit/results.xml"
          # Move back for artifact upload
          mv test-results-temp test-results-mobile || true

      # ===== ALLURE REPORT GENERATION =====
      - name: Generate Allure Report for Mobile
        uses: ./.github/actions/generate-allure-report
        with:
          results-dir: docker-builds/e2e-tests/allure-results-mobile
          output-dir: e2e/mobile-webui/allure-report
          artifact-name: allure-report-mobile-webui
      # ===== END ALLURE REPORT GENERATION =====

      - name: push-image metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postmobiletest
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postmobiletest
      - name: produce-summary
        run: |
          echo '#### images' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postmobiletest' >> $GITHUB_STEP_SUMMARY
      - name: assert success
        working-directory: docker-builds/e2e-tests/
        run: |
          if [ $(cat playwright.exit-code) != 0 ]; then tail -1000 playwright.log && exit 1; fi
      - uses: actions/upload-artifact@v4
        if: success() || failure() # upload the artifact even if is success because that artifact can contain valuable information about how to improve, optimize etc
        with:
          name: playwright-mobile-report
          path: |
            docker-builds/e2e-tests/playwright-report-mobile/
            docker-builds/e2e-tests/test-results-mobile/
          retention-days: 30

  frontend_webui_test:
    name: frontend webui test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [ init, backend, frontend, preloaded-db ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: metasfresh
          password: ${{ secrets.DOCKERHUB_METASFRESH_RW_TOKEN }}
      - uses: testspace-com/setup-testspace@v1
        with:
          domain: metasfresh
          token: ${{ secrets.TESTSPACE_TOKEN }}
      - name: run test
        working-directory: docker-builds/e2e-tests/
        env:
          mfversion: ${{ needs.init.outputs.tag-fixed }}
          mfregistry: metasfresh
          dbqualifier: preloaded
        run: |
          docker compose --profile frontend up --abort-on-container-exit --exit-code-from playwright-frontend 2>&1 | tee playwright.log && echo "${PIPESTATUS[0]}" > playwright.exit-code
          docker commit e2e-tests-db-1 metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postfrontendtest
          docker compose --profile frontend down
      - name: push-results
        working-directory: docker-builds/e2e-tests/
        run: |
          # Move test-results temporarily to avoid Testspace uploading large attachment files
          mv test-results-frontend test-results-temp || true
          testspace "[frontend/playwright]playwright-report-frontend/junit/results.xml"
          # Move back for artifact upload
          mv test-results-temp test-results-frontend || true

      # ===== ALLURE REPORT GENERATION =====
      - name: Generate Allure Report for Frontend
        uses: ./.github/actions/generate-allure-report
        with:
          results-dir: docker-builds/e2e-tests/allure-results
          output-dir: e2e/frontend-webui/allure-report
          artifact-name: allure-report-frontend-webui
      # ===== END ALLURE REPORT GENERATION =====

      - name: push-image metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postfrontendtest
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ vars.RETRY_ATTEMPTS }}
          retry_wait_seconds: ${{ vars.RETRY_DELAY }}
          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postfrontendtest
      - name: produce-summary
        run: |
          echo '#### images' >> $GITHUB_STEP_SUMMARY
          echo '* metasfresh/metas-db:${{ needs.init.outputs.tag-fixed }}-postfrontendtest' >> $GITHUB_STEP_SUMMARY
      - name: assert success
        working-directory: docker-builds/e2e-tests/
        run: |
          if [ $(cat playwright.exit-code) != 0 ]; then tail -1000 playwright.log && exit 1; fi
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: playwright-frontend-report
          path: |
            docker-builds/e2e-tests/playwright-report-frontend/
            docker-builds/e2e-tests/test-results-frontend/
          retention-days: 30

  allure_publish:
    name: Publish Allure Reports to R2
    runs-on: ubuntu-latest
    needs: [ init, frontend_webui_test, mobile_test, cucumber-allure-report ]
    if: always()  # Run even if tests failed
    permissions: {}
    steps:
      - name: Setup directory structure
        run: |
          BRANCH_SANITIZED="${{ needs.init.outputs.branch-sanitized-gh-pages }}"

          # Create directory structure for reports
          mkdir -p "reports/branches/${BRANCH_SANITIZED}/builds/${{ needs.init.outputs.tag-fixed }}/frontend-webui"
          mkdir -p "reports/branches/${BRANCH_SANITIZED}/builds/${{ needs.init.outputs.tag-fixed }}/mobile-webui"
          mkdir -p "reports/branches/${BRANCH_SANITIZED}/builds/${{ needs.init.outputs.tag-fixed }}/cucumber"

          echo "Created directory structure for branch: ${BRANCH_SANITIZED}, build: ${{ needs.init.outputs.tag-fixed }}"

      - name: Download Allure report artifact
        if: needs.frontend_webui_test.result == 'success' || needs.frontend_webui_test.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: allure-report-frontend-webui
          path: reports/branches/${{ needs.init.outputs.branch-sanitized-gh-pages }}/builds/${{ needs.init.outputs.tag-fixed }}/frontend-webui/

      - name: Download Mobile Allure report artifact
        if: needs.mobile_test.result == 'success' || needs.mobile_test.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: allure-report-mobile-webui
          path: reports/branches/${{ needs.init.outputs.branch-sanitized-gh-pages }}/builds/${{ needs.init.outputs.tag-fixed }}/mobile-webui/

      - name: Download Cucumber Allure report artifact
        if: needs.cucumber-allure-report.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: allure-report-cucumber
          path: reports/branches/${{ needs.init.outputs.branch-sanitized-gh-pages }}/builds/${{ needs.init.outputs.tag-fixed }}/cucumber/
        continue-on-error: true

      - name: Verify reports exist
        id: verify_reports
        run: |
          BRANCH_SANITIZED="${{ needs.init.outputs.branch-sanitized-gh-pages }}"
          BUILD_DIR="reports/branches/${BRANCH_SANITIZED}/builds/${{ needs.init.outputs.tag-fixed }}"

          REPORTS_FOUND=0

          if [ -f "${BUILD_DIR}/frontend-webui/index.html" ]; then
            echo "✓ Frontend WebUI report found"
            REPORTS_FOUND=$((REPORTS_FOUND + 1))
          fi

          if [ -f "${BUILD_DIR}/mobile-webui/index.html" ]; then
            echo "✓ Mobile WebUI report found"
            REPORTS_FOUND=$((REPORTS_FOUND + 1))
          fi

          if [ -f "${BUILD_DIR}/cucumber/index.html" ]; then
            echo "✓ Cucumber report found"
            REPORTS_FOUND=$((REPORTS_FOUND + 1))
          fi

          echo "reports_found=${REPORTS_FOUND}" >> $GITHUB_OUTPUT

          if [ "$REPORTS_FOUND" -eq 0 ]; then
            echo "::error::No Allure reports found to publish!"
            exit 1
          fi

          echo "Found ${REPORTS_FOUND} report(s) to publish"

      # ===== CLOUDFLARE R2 UPLOAD =====
      - name: Configure AWS CLI for R2
        run: |
          # Install AWS CLI if not already available
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi

          # Configure AWS CLI to use R2
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

      - name: Sync reports to Cloudflare R2
        run: |
          BRANCH_SANITIZED="${{ needs.init.outputs.branch-sanitized-gh-pages }}"

          echo "Syncing reports to R2..."
          aws s3 sync reports/ s3://${{ vars.R2_BUCKET_NAME }}/ \
            --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
            --no-progress

          echo "✓ Reports synced to R2"
          echo "Total size: $(du -sh reports | cut -f1)"

      - name: Cleanup old builds from R2
        run: |
          BRANCH_SANITIZED="${{ needs.init.outputs.branch-sanitized-gh-pages }}"
          MAX_BUILDS_PER_BRANCH=10

          echo "Cleaning up old builds for branch: ${BRANCH_SANITIZED}"
          echo "Keeping only the ${MAX_BUILDS_PER_BRANCH} most recent builds"

          # List all builds for this branch, sorted by modification time (newest first)
          aws s3api list-objects-v2 \
            --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
            --bucket ${{ vars.R2_BUCKET_NAME }} \
            --prefix "branches/${BRANCH_SANITIZED}/builds/" \
            --delimiter "/" \
            --query 'CommonPrefixes[].Prefix' \
            --output text | tr '\t' '\n' | sort -r > all_builds.txt

          # Count builds
          BUILD_COUNT=$(wc -l < all_builds.txt)
          echo "Found ${BUILD_COUNT} builds"

          if [ "$BUILD_COUNT" -gt "$MAX_BUILDS_PER_BRANCH" ]; then
            # Keep the newest builds, delete the rest
            BUILDS_TO_DELETE=$((BUILD_COUNT - MAX_BUILDS_PER_BRANCH))
            echo "Deleting ${BUILDS_TO_DELETE} old build(s)"

            tail -n "$BUILDS_TO_DELETE" all_builds.txt | while read -r build_prefix; do
              echo "Deleting: ${build_prefix}"
              aws s3 rm "s3://${{ vars.R2_BUCKET_NAME }}/${build_prefix}" \
                --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
                --recursive
            done

            echo "✓ Cleanup completed"
          else
            echo "No cleanup needed (${BUILD_COUNT} <= ${MAX_BUILDS_PER_BRANCH})"
          fi

      - name: produce-summary
        run: |
          BRANCH_SANITIZED="${{ needs.init.outputs.branch-sanitized-gh-pages }}"
          VERSION="${{ needs.init.outputs.tag-fixed }}"
          R2_BASE_URL="https://pub-c55eb97d86224a4e951c219dfc2057b8.r2.dev/branches/${BRANCH_SANITIZED}/builds/${VERSION}"

          echo '#### 📊 Allure Test Reports' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| Report | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend WebUI | [View](${R2_BASE_URL}/frontend-webui/index.html) |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile WebUI | [View](${R2_BASE_URL}/mobile-webui/index.html) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber | [View](${R2_BASE_URL}/cucumber/index.html) |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "🧹 Keeping last 10 builds per branch (automatic cleanup enabled)" >> $GITHUB_STEP_SUMMARY

  cicd-dispatch:
    if: contains(fromJson(vars.CICD_BRANCH_MAP), github.ref_name) == true
    runs-on: ubuntu-latest
    needs: [ init, compatibility-images ]
    steps:
      - name: dispatch-workflow
        env:
          CICD_RUN_ID: ${{ github.run_id }}
          TAG_FIXED: ${{ needs.init.outputs.tag-fixed }}
          GH_TOKEN: ${{ secrets.CICD_TRIGGER_DISPATCH }}
          CICD_DISPATCH_REPO: ${{ fromJson(vars.CICD_DISPATCH_CONFIG).repo }}
          CICD_DISPATCH_WORKFLOW_FILE: ${{ fromJson(vars.CICD_DISPATCH_CONFIG).workflow_file }}
        run: |
          gh workflow run "${CICD_DISPATCH_WORKFLOW_FILE}" --repo "${CICD_DISPATCH_REPO}" -f "cicd_run_id=${CICD_RUN_ID}" -f "tag_fixed=${TAG_FIXED}"
