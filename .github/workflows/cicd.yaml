          timeout_minutes: ${{ vars.RETRY_TIMEOUT }}
          command: docker push --quiet metasfresh/metas-api:${{ needs.init.outputs.tag-floating }}
      - name: push-image metasfresh/metas-app:${{ needs.init.outputs.tag-fixed }}
        if: env.ACT != 'true'
