name: R2 Cleanup - Deleted Branches

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview deletions without executing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    name: Clean up R2 reports for deleted branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all branches

      - name: Configure AWS CLI for R2
        run: |
          # Install AWS CLI if not already available
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi

          # Configure AWS CLI to use R2
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

      - name: Get all branches from GitHub
        id: get_branches
        run: |
          echo "Fetching all branches from GitHub..."

          # Get all remote branches (strip 'origin/' prefix and 'HEAD ->' line)
          git branch -r | grep -v '\->' | sed 's/origin\///' | sed 's/^[[:space:]]*//' > github_branches.txt

          BRANCH_COUNT=$(wc -l < github_branches.txt)
          echo "Found ${BRANCH_COUNT} branches in GitHub"
          echo "branch_count=${BRANCH_COUNT}" >> $GITHUB_OUTPUT

          # Show first 10 branches for debugging
          echo "Sample branches:"
          head -10 github_branches.txt

      - name: Get all branch folders from R2
        id: get_r2_folders
        run: |
          echo "Fetching all branch folders from R2..."

          # List all "directories" under branches/
          aws s3api list-objects-v2 \
            --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
            --bucket ${{ vars.R2_BUCKET_NAME }} \
            --prefix "branches/" \
            --delimiter "/" \
            --query 'CommonPrefixes[].Prefix' \
            --output text | tr '\t' '\n' | sed 's|branches/||' | sed 's|/$||' > r2_branches.txt

          R2_BRANCH_COUNT=$(wc -l < r2_branches.txt)
          echo "Found ${R2_BRANCH_COUNT} branch folders in R2"
          echo "r2_branch_count=${R2_BRANCH_COUNT}" >> $GITHUB_OUTPUT

          # Show first 10 folders for debugging
          echo "Sample R2 branch folders:"
          head -10 r2_branches.txt

      - name: Identify deleted branches
        id: identify_deleted
        run: |
          echo "Identifying branches that exist in R2 but not in GitHub..."

          # Find branches in R2 that don't exist in GitHub
          # Sort both files and use comm to find lines only in r2_branches.txt
          sort github_branches.txt > github_sorted.txt
          sort r2_branches.txt > r2_sorted.txt

          # comm -13: suppress lines unique to file1 and common lines (show only lines unique to file2)
          comm -13 github_sorted.txt r2_sorted.txt > branches_to_delete.txt

          DELETE_COUNT=$(wc -l < branches_to_delete.txt)
          echo "delete_count=${DELETE_COUNT}" >> $GITHUB_OUTPUT

          if [ "$DELETE_COUNT" -gt 0 ]; then
            echo "Found ${DELETE_COUNT} deleted branch(es) to clean up:"
            cat branches_to_delete.txt
          else
            echo "No deleted branches found - nothing to clean up"
          fi

      - name: Calculate storage to be freed
        if: steps.identify_deleted.outputs.delete_count > 0
        id: calculate_size
        run: |
          echo "Calculating storage size of deleted branches..."

          TOTAL_SIZE=0
          while read -r branch; do
            # Get size of all objects in this branch folder
            SIZE=$(aws s3api list-objects-v2 \
              --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
              --bucket ${{ vars.R2_BUCKET_NAME }} \
              --prefix "branches/${branch}/" \
              --query 'sum(Contents[].Size)' \
              --output text)

            if [ "$SIZE" != "None" ] && [ -n "$SIZE" ]; then
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              SIZE_MB=$((SIZE / 1024 / 1024))
              echo "  ${branch}: ${SIZE_MB} MB"
            fi
          done < branches_to_delete.txt

          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          TOTAL_SIZE_GB=$((TOTAL_SIZE / 1024 / 1024 / 1024))

          echo "total_size_mb=${TOTAL_SIZE_MB}" >> $GITHUB_OUTPUT
          echo "total_size_gb=${TOTAL_SIZE_GB}" >> $GITHUB_OUTPUT
          echo ""
          echo "Total storage to be freed: ${TOTAL_SIZE_MB} MB (${TOTAL_SIZE_GB} GB)"

      - name: Delete reports for deleted branches (DRY RUN)
        if: |
          steps.identify_deleted.outputs.delete_count > 0 &&
          (github.event_name == 'schedule' || github.event.inputs.dry_run == 'true')
        run: |
          echo "🔍 DRY RUN MODE - No actual deletions will be performed"
          echo ""
          echo "The following branches would be deleted from R2:"
          echo "================================================"

          while read -r branch; do
            # Count objects
            OBJECT_COUNT=$(aws s3api list-objects-v2 \
              --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
              --bucket ${{ vars.R2_BUCKET_NAME }} \
              --prefix "branches/${branch}/" \
              --query 'length(Contents)' \
              --output text)

            echo "  ❌ branches/${branch}/ (${OBJECT_COUNT} objects)"
          done < branches_to_delete.txt

          echo ""
          echo "To execute deletions, run this workflow manually with dry_run=false"

      - name: Delete reports for deleted branches (EXECUTE)
        if: |
          steps.identify_deleted.outputs.delete_count > 0 &&
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry_run == 'false'
        run: |
          echo "🗑️  EXECUTING DELETIONS"
          echo ""

          DELETED_COUNT=0
          while read -r branch; do
            echo "Deleting branches/${branch}/..."

            aws s3 rm "s3://${{ vars.R2_BUCKET_NAME }}/branches/${branch}/" \
              --endpoint-url ${{ vars.R2_ENDPOINT_URL }} \
              --recursive

            if [ $? -eq 0 ]; then
              echo "  ✓ Deleted branches/${branch}/"
              DELETED_COUNT=$((DELETED_COUNT + 1))
            else
              echo "  ✗ Failed to delete branches/${branch}/"
            fi
          done < branches_to_delete.txt

          echo ""
          echo "Successfully deleted ${DELETED_COUNT} branch folder(s)"

      - name: Generate summary
        if: always()
        run: |
          echo '## 🧹 R2 Cleanup Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          echo '### Statistics' >> $GITHUB_STEP_SUMMARY
          echo '| Metric | Count |' >> $GITHUB_STEP_SUMMARY
          echo '|--------|-------|' >> $GITHUB_STEP_SUMMARY
          echo "| Active branches (GitHub) | ${{ steps.get_branches.outputs.branch_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch folders (R2) | ${{ steps.get_r2_folders.outputs.r2_branch_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deleted branches found | ${{ steps.identify_deleted.outputs.delete_count }} |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.identify_deleted.outputs.delete_count }}" -gt 0 ]; then
            echo '### Storage Impact' >> $GITHUB_STEP_SUMMARY
            echo "- **Size to free**: ${{ steps.calculate_size.outputs.total_size_mb }} MB (${{ steps.calculate_size.outputs.total_size_gb }} GB)" >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY

            echo '### Branches to Clean Up' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat branches_to_delete.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY

            if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
              echo '### 🔍 Mode: DRY RUN' >> $GITHUB_STEP_SUMMARY
              echo 'No deletions were performed. To execute, run this workflow manually with `dry_run=false`.' >> $GITHUB_STEP_SUMMARY
            else
              echo '### ✅ Mode: EXECUTED' >> $GITHUB_STEP_SUMMARY
              echo 'Deletions have been performed.' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo '### ✅ Result' >> $GITHUB_STEP_SUMMARY
            echo 'No cleanup needed - all R2 branch folders correspond to active GitHub branches.' >> $GITHUB_STEP_SUMMARY
          fi
