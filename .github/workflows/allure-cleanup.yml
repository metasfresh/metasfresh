name: Cleanup Stale Allure Reports

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  workflow_dispatch:
    inputs:
      days_threshold:
        description: 'Days since last update to consider stale'
        required: false
        default: '60'
      delete_immediately:
        description: 'Delete immediately (skip marking)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  cleanup:
    name: Cleanup Stale Reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Get active branches from repository
        id: active
        run: |
          BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "active_branches=${BRANCHES}" >> $GITHUB_OUTPUT

      - name: Identify stale branches
        id: stale
        run: |
          DAYS=${{ github.event.inputs.days_threshold || '60' }}
          CUTOFF=$(date -u -d "${DAYS} days ago" +%Y-%m-%d)

          echo "Cutoff date: ${CUTOFF}"
          echo "Active branches from repo: ${{ steps.active.outputs.active_branches }}"

          if [ ! -f "_data/branches.json" ]; then
            echo "No branches.json found, nothing to clean up"
            echo "stale_branches=" >> $GITHUB_OUTPUT
            exit 0
          fi

          STALE=$(jq -r --arg cutoff "$CUTOFF" --argjson active "${{ steps.active.outputs.active_branches }}" '
            .branches[] |
            select((.lastUpdate < $cutoff) or ($active | index(.name) == null)) |
            .sanitized
          ' _data/branches.json)

          echo "Stale branches found:"
          echo "$STALE"

          echo "stale_branches<<EOF" >> $GITHUB_OUTPUT
          echo "$STALE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Mark or delete stale branches
        run: |
          DELETE="${{ github.event.inputs.delete_immediately }}"

          while IFS= read -r sanitized; do
            [ -z "$sanitized" ] && continue

            echo "Processing: $sanitized"

            # Check for protected reports (.keep-forever marker)
            PROTECTED=$(find "branches/$sanitized" -name ".keep-forever" 2>/dev/null | wc -l)

          if [ "$PROTECTED" -gt 0 ]; then
              echo "  ✓ Protected: $sanitized has $PROTECTED reports with .keep-forever marker"
              continue
            fi

            if [ "$DELETE" = "true" ]; then
              # Delete branch reports
              if [ -d "branches/$sanitized" ]; then
                echo "  ✗ Deleting: branches/$sanitized"
                rm -rf "branches/$sanitized"

                # Remove from metadata
                if [ -f "_data/branches.json" ]; then
                  jq --arg san "$sanitized" '.branches |= map(select(.sanitized != $san))' \
                    _data/branches.json > _data/branches.json.tmp
                  mv _data/branches.json.tmp _data/branches.json
                fi
              fi
            else
              # Mark as stale
              if [ -f "_data/branches.json" ]; then
                echo "  ⚠ Marking as stale: $sanitized"
                jq --arg san "$sanitized" '
                  .branches |= map(if .sanitized == $san then . + {"branch_status": "stale"} else . end)
                ' _data/branches.json > _data/branches.json.tmp
                mv _data/branches.json.tmp _data/branches.json
              fi
            fi
          done <<< "${{ steps.stale.outputs.stale_branches }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          DELETE="${{ github.event.inputs.delete_immediately }}"
          DAYS=${{ github.event.inputs.days_threshold || '60' }}

          if [ "$DELETE" = "true" ]; then
            COMMIT_MSG="Cleanup: Deleted stale branches (${DAYS} days threshold)"
          else
            COMMIT_MSG="Cleanup: Marked stale branches (${DAYS} days threshold)"
          fi

          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git push origin gh-pages || echo "Nothing to push"

      - name: Generate summary
        run: |
          echo "### Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Threshold:** ${{ github.event.inputs.days_threshold || '60' }} days" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** $([ '${{ github.event.inputs.delete_immediately }}' = 'true' ] && echo 'Delete' || echo 'Mark as stale')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          STALE_COUNT=$(echo "${{ steps.stale.outputs.stale_branches }}" | grep -c . || echo 0)
          echo "**Stale branches found:** $STALE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $STALE_COUNT -gt 0 ]; then
            echo "**Processed branches:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.stale.outputs.stale_branches }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
