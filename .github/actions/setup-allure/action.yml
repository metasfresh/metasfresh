name: 'Setup Allure CLI'
description: 'Install Allure command-line tool for report generation'
runs:
  using: 'composite'
  steps:
    - name: Install Allure CLI
      shell: bash
      run: |
        echo "Installing Allure CLI v2.32.1..."
        wget -q https://github.com/allure-framework/allure2/releases/download/2.32.1/allure-2.32.1.tgz -O /tmp/allure.tgz
        sudo tar -xzf /tmp/allure.tgz -C /opt/
        sudo ln -sf /opt/allure-2.32.1/bin/allure /usr/local/bin/allure
        allure --version
        echo "✓ Allure CLI installed successfully"
