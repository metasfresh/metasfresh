name: 'Generate JUnit HTML Report'
description: 'Convert JUnit XML to browsable HTML using Allure Report with history support'

inputs:
  xml-path:
    description: 'Path to JUnit XML file(s) - supports glob patterns'
    required: true
  output-dir:
    description: 'Output directory for HTML report'
    required: true
  artifact-name:
    description: 'Name for the uploaded report artifact'
    required: true
  report-title:
    description: 'Title for the HTML report (used in environment name)'
    required: false
    default: 'JUnit Test Report'
  history-artifact-name:
    description: 'Name of artifact containing previous history for trends (optional)'
    required: false
    default: ''
  retention-days:
    description: 'Number of days to retain the artifact'
    required: false
    default: '1'

runs:
  using: 'composite'
  steps:
    - name: Setup Allure CLI
      uses: ./.github/actions/setup-allure

    # Download previous history from last run on same branch
    - name: Download previous Allure history
      if: inputs.history-artifact-name != ''
      uses: dawidd6/action-download-artifact@v6
      with:
        name: ${{ inputs.history-artifact-name }}
        path: junit-history-temp
        workflow_conclusion: ''
        branch: ${{ github.ref_name }}
        if_no_artifact_found: ignore
        search_artifacts: true

    - name: Generate Allure Report from JUnit XML
      shell: bash
      env:
        XML_PATH: ${{ inputs.xml-path }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        REPORT_TITLE: ${{ inputs.report-title }}
        HISTORY_ARTIFACT: ${{ inputs.history-artifact-name }}
        GH_SERVER_URL: ${{ github.server_url }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_RUN_ID: ${{ github.run_id }}
        GH_RUN_NUMBER: ${{ github.run_number }}
      run: |
        # Extract directory from xml-path pattern
        XML_DIR=$(echo "$XML_PATH" | sed 's|\*\*/\*\.xml$||' | sed 's|\*\.xml$||' | sed 's|/$||')

        # Check if directory exists and has XML files
        if [ -d "$XML_DIR" ]; then
          FILE_COUNT=$(find "$XML_DIR" -name "*.xml" -type f 2>/dev/null | wc -l)
        else
          FILE_COUNT=0
        fi

        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "::warning::No JUnit XML files found matching: $XML_PATH"
          mkdir -p "$OUTPUT_DIR"
          echo '<!DOCTYPE html><html><head><title>No Test Results</title></head><body><h1>No Test Results Available</h1><p>No JUnit XML files were found for this test run.</p></body></html>' > "$OUTPUT_DIR/index.html"
          exit 0
        fi

        echo "Found $FILE_COUNT XML files in $XML_DIR"

        # Allure doesn't recursively read subdirectories, so copy all XML files to a flat temp directory
        ALLURE_INPUT_DIR=$(mktemp -d)
        echo "Copying XML files to flat directory: $ALLURE_INPUT_DIR"
        find "$XML_DIR" -name "*.xml" -type f -exec cp {} "$ALLURE_INPUT_DIR/" \;
        COPIED_COUNT=$(ls -1 "$ALLURE_INPUT_DIR"/*.xml 2>/dev/null | wc -l)
        echo "Copied $COPIED_COUNT XML files to Allure input directory"

        # Create environment.properties for Allure report metadata
        printf "Report.Name=%s\nTest.Type=JUnit\n" "$REPORT_TITLE" > "$ALLURE_INPUT_DIR/environment.properties"
        echo "Created environment.properties with Report.Name=$REPORT_TITLE"

        # Create executor.json for CI build info and report title in heading
        BUILD_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}"
        cat << EOF > "$ALLURE_INPUT_DIR/executor.json"
        {
          "name": "GitHub Actions",
          "type": "github",
          "buildName": "#${GH_RUN_NUMBER}",
          "buildUrl": "${BUILD_URL}",
          "reportName": "${REPORT_TITLE}"
        }
        EOF
        sed -i 's/^[[:space:]]*//' "$ALLURE_INPUT_DIR/executor.json"
        echo "Created executor.json with build #${GH_RUN_NUMBER} and reportName=${REPORT_TITLE}"

        # Copy history if available (enables trend charts)
        if [ -n "$HISTORY_ARTIFACT" ] && [ -d "junit-history-temp" ]; then
          HISTORY_COUNT=$(ls junit-history-temp 2>/dev/null | wc -l)
          if [ "$HISTORY_COUNT" -gt 0 ]; then
            mkdir -p "$ALLURE_INPUT_DIR/history"
            cp -r junit-history-temp/* "$ALLURE_INPUT_DIR/history/"
            echo "Copied $HISTORY_COUNT history files - trends will be available"
          else
            echo "History directory empty - trends will not be available (first run)"
          fi
        else
          echo "No history available - trends will not be available"
        fi

        # Use Allure to generate HTML report from JUnit XML
        echo "Generating Allure report from JUnit XML..."
        allure generate "$ALLURE_INPUT_DIR" -o "$OUTPUT_DIR" --clean || {
          echo "::warning::Allure failed, creating fallback report"
          mkdir -p "$OUTPUT_DIR"
          echo "<!DOCTYPE html><html><head><title>${REPORT_TITLE}</title></head><body><h1>${REPORT_TITLE}</h1><p>Failed to generate report from ${FILE_COUNT} JUnit XML files.</p></body></html>" > "$OUTPUT_DIR/index.html"
        }

        # Clean up temp directories
        rm -rf "$ALLURE_INPUT_DIR"
        rm -rf junit-history-temp

        # Verify index.html was created
        if [ -f "$OUTPUT_DIR/index.html" ]; then
          echo "Generated Allure report at: $OUTPUT_DIR/index.html"
          echo "Report title: $REPORT_TITLE"
          echo "Files processed: $FILE_COUNT"
        else
          echo "::error::Failed to generate index.html at $OUTPUT_DIR/index.html"
          exit 1
        fi

    - name: Upload report artifact
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}
        retention-days: ${{ inputs.retention-days }}

    # Upload history for next build (enables trends over time)
    - name: Upload history for trends
      if: inputs.history-artifact-name != '' && (success() || failure())
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.history-artifact-name }}
        path: ${{ inputs.output-dir }}/history
        retention-days: 30
        overwrite: true
